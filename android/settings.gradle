pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = file("local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withInputStream { properties.load(it) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        assert sdkPath != null, "flutter.sdk not set in local.properties"
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // Actualizado a una versión estándar y estable
    id "com.android.application" version "8.4.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
    // Actualizado a 4.4.1 para total compatibilidad con las últimas librerías de Firebase
    id "com.google.gms.google-services" version "4.4.1" apply false
}

include ":app"